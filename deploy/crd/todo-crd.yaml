apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: todos.todo.grafana.app
spec:
  group: todo.grafana.app
  scope: Namespaced
  names:
    kind: Todo
    plural: todos
  versions:
    - name: v1
      served: true
      storage: true
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          required:
            - spec
          properties:
            spec:
              type: object
              required:
                - title
                - status
              properties:
                title:
                  description: "Title of the TODO item (required)"
                  type: string
                description:
                  description: "Optional description of the TODO item"
                  type: string
                status:
                  description: "Current status of the TODO item"
                  type: string
                  enum:
                    - open
                    - in_progress
                    - done
            status:
              type: object
              properties:
                operatorStates:
                  description: "operatorStates is a map of operator ID to operator state evaluations."
                  type: object
                  additionalProperties:
                    type: object
                    required:
                      - lastEvaluation
                      - state
                    properties:
                      lastEvaluation:
                        description: "lastEvaluation is the ResourceVersion last evaluated"
                        type: string
                      state:
                        description: "state describes the state of the lastEvaluation."
                        type: string
                        enum:
                          - success
                          - in_progress
                          - failed
                      descriptiveState:
                        description: "descriptiveState is an optional more descriptive state field"
                        type: string
                      details:
                        description: "details contains any extra information that is operator-specific"
                        type: object
                        x-kubernetes-preserve-unknown-fields: true
                additionalFields:
                  description: "additionalFields is reserved for future use"
                  type: object
                  x-kubernetes-preserve-unknown-fields: true
