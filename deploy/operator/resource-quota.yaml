# ResourceQuota per il namespace todo-app
apiVersion: v1
kind: ResourceQuota
metadata:
  name: todo-app-quota
  namespace: todo-app
  labels:
    app.kubernetes.io/part-of: forgia-example-todo
spec:
  hard:
    requests.cpu: "500m"
    requests.memory: 256Mi
    limits.cpu: "1"
    limits.memory: 512Mi
    pods: "10"
