# Service per esporre le metriche del todo-operator
apiVersion: v1
kind: Service
metadata:
  name: todo-operator
  namespace: todo-app
  labels:
    app.kubernetes.io/name: todo-operator
    app.kubernetes.io/component: operator
    app.kubernetes.io/part-of: forgia-example-todo
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: todo-operator
  ports:
    - name: metrics
      port: 9090
      targetPort: metrics
      protocol: TCP
